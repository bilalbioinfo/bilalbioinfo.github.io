  summary: >
    Computational biologist working in computational biology, palaeogenomics, and population
    genetics. I develop bioinformatic pipelines to recover and analyse highly degraded ancient
    DNA from deep-time samples, studying the ecology, population dynamics, and evolutionary
    history of different species, and I am interested in metagenomic approaches to ancient
    environments and the integration of multi-omics data to reconstruct past ecosystems.

